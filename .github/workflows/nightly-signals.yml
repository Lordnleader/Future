name: Nightly Future Signals

on:
  schedule:
    # 00:00 UTC is 01:00 London during British Summer Time.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate nightly signal candidates
        run: node scripts/generate-nightly-signals.js --live
        env:
          NASA_FIRMS_API_KEY: ${{ secrets.NASA_FIRMS_API_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}

      - name: Commit generated data
        run: |
          if git diff --quiet -- data/live-signal-candidates.json; then
            echo "No signal data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live-signal-candidates.json
          git commit -m "Update nightly signal candidates"
          git push
